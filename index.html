<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 5: US Airport Distribution Spatial Analysis</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    
    <!-- Title Bar -->
    <div id="title-bar">
        <h1>Lab 5: Spatial Analysis of US Airports</h1>
    </div>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Control Panel -->
    <div id="control-panel">
        <h3>Display Layer</h3>
        <button id="btn-count" class="active">Airport Count</button>
        <button id="btn-rates">Airport Rates</button>
        <button id="btn-symbols">Proportional Symbols</button>
        <hr>
        <div id="legend"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    
    <!-- Turf.js for Spatial Analysis -->
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>

    <!-- Simple Statistics for Natural Breaks (Jenks) -->
    <script src="https://unpkg.com/simple-statistics@7.8.3/dist/simple-statistics.min.js"></script>

    <!-- Custom JavaScript -->
    <script src="js/main.js"></script>
</body>
</html>
